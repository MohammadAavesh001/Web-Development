<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Demo</title>
    <style>
        :root {
            --bg: #fff;
            --txt: #000;
            --btn: #09f;
            --title:rgb(212, 11, 11);
        }
        
        body.dark {
            --bg: #000;
            --txt: #fff;
            --btn: rgb(0, 255, 64);
            --title:rgb(26, 46, 24);
        }
        
        header {
            background: var(--bg);
            color: var(--txt);
            background-color: var(--title);
            text-align: center;
            transition: 0.3s;
            padding: 50px 20px;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: Arial;
            padding: 20px;
            transition: 0.3s;
        }
        
        button {
            background: var(--btn);
            color: #fff;
            cursor: pointer;  
            padding: 18px 20px; 
            width: 300px;
            text-align: left;      
            font-size: 18px;    
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        
        nav a {
            color: var(--txt);
            margin: 0 15px;
            text-decoration: none;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        /* FORM CENTER + BIGGER */
        #form {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }
        
        input {
            display: block;
            margin: 15px 0;    
            padding: 18px 20px; 
            width: 350px;       
            font-size: 18px;    
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        
        #form button {
            margin-top: 10px;
            padding: 18px 40px; 
            font-size: 18px;
            border-radius: 8px;
            width: 350px;       
        }
        
        .error {
            color: red;
            font-size: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    
    
    
    <header><button onclick="toggleDark()">
        🌙 Dark
    </button><h1>Mini Magic!</h1></header>

    <section id="form">
        <h2>Form</h2>
        <form onsubmit="return validateForm()">
            <input id="email" type="email" placeholder="Email">
            <span id="error" class="error"></span>
            <input id="password" type="password" placeholder="Pass" minlength="6">
            <button>Send</button>
        </form>
    </section>

    <script>
        let isDark = false;
        
        function toggleDark() {
            isDark = !isDark;
            document.body.classList.toggle('dark', isDark);
            event.target.innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
        }
        
        function validateForm() {
            const email = document.getElementById('email').value;
            if (!email.includes('@')) {
                document.getElementById('error').innerHTML = 'Needs @!';
                return false;
            }
            alert('Good!');
            return false;
        }
    </script>
</body>
</html>
