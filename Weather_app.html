<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container { width: 100%; max-width: 420px; }

  h1 {
    text-align: center;
    color: #fff;
    font-size: 1.4rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
  }

  .search-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }

  input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input::placeholder { color: rgba(255,255,255,0.35); }
  input:focus { border-color: rgba(255,255,255,0.3); }

  button {
    background: #4f8ef7;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #3a7af5; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }

  .chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .chip:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.2); }

  #status {
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    margin-bottom: 8px;
    color: rgba(255,255,255,0.5);
  }
  #status.error { color: #ff7675; }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #card {
    display: none;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .wx-icon { font-size: 72px; margin-bottom: 0.5rem; }
  .temp { font-size: 60px; font-weight: 300; color: #fff; line-height: 1; }
  .city-name { font-size: 18px; font-weight: 500; color: #fff; margin-top: 0.75rem; }
  .condition { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .feels { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .stat { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 8px; }
  .stat-icon { font-size: 18px; margin-bottom: 6px; }
  .stat-val { font-size: 15px; font-weight: 500; color: #fff; }
  .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

  .updated { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 1.25rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🌤 Weather App</h1>
  <div class="search-row">
    <input id="q" type="text" placeholder="Enter any city name..." />
    <button id="btn" onclick="getWeather()">Search</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="go('Delhi')">Delhi</span>
    <span class="chip" onclick="go('Mumbai')">Mumbai</span>
    <span class="chip" onclick="go('Bengaluru')">Bengaluru</span>
    <span class="chip" onclick="go('Chennai')">Chennai</span>
    <span class="chip" onclick="go('Kolkata')">Kolkata</span>
    <span class="chip" onclick="go('Hyderabad')">Hyderabad</span>
    <span class="chip" onclick="go('Jaipur')">Jaipur</span>
    <span class="chip" onclick="go('Harda')">Harda</span>
    <span class="chip" onclick="go('London')">London</span>
    <span class="chip" onclick="go('New York')">New York</span>
  </div>
  <div id="status"></div>
  <div id="card">
    <div class="wx-icon" id="icon"></div>
    <div class="temp" id="temp"></div>
    <div class="city-name" id="city"></div>
    <div class="condition" id="cond"></div>
    <div class="feels" id="feels"></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-icon">💧</div>
        <div class="stat-val" id="hum"></div>
        <div class="stat-lbl">Humidity</div>
      </div>
      <div class="stat">
        <div class="stat-icon">💨</div>
        <div class="stat-val" id="wind"></div>
        <div class="stat-lbl">Wind</div>
      </div>
      <div class="stat">
        <div class="stat-icon">👁</div>
        <div class="stat-val" id="vis"></div>
        <div class="stat-lbl">Visibility</div>
      </div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
</div>

<script>
  const WX_ICONS = {
    113:'☀️',116:'⛅',119:'☁️',122:'☁️',143:'🌫️',176:'🌦️',179:'🌨️',
    182:'🌧️',185:'🌧️',200:'⛈️',227:'❄️',230:'❄️',248:'🌫️',260:'🌫️',
    263:'🌦️',266:'🌦️',281:'🌧️',284:'🌧️',293:'🌧️',296:'🌧️',299:'🌧️',
    302:'🌧️',305:'🌧️',308:'🌧️',311:'🌧️',314:'🌧️',317:'🌨️',320:'🌨️',
    323:'❄️',326:'❄️',329:'❄️',332:'❄️',335:'❄️',338:'❄️',350:'🌧️',
    353:'🌦️',356:'🌧️',359:'🌧️',362:'🌨️',365:'🌨️',368:'🌨️',371:'❄️',
    374:'🌨️',377:'🌨️',386:'⛈️',389:'⛈️',392:'⛈️',395:'⛈️'
  };

  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter') getWeather();
  });

  function go(city) {
    document.getElementById('q').value = city;
    getWeather();
  }

  function setStatus(msg, isError=false, loading=false) {
    const el = document.getElementById('status');
    el.className = isError ? 'error' : '';
    el.innerHTML = loading ? `<span class="spinner"></span>${msg}` : msg;
  }

  async function getWeather() {
    const city = document.getElementById('q').value.trim();
    if (!city) return;

    const btn = document.getElementById('btn');
    btn.disabled = true;
    document.getElementById('card').style.display = 'none';
    setStatus('Fetching weather for ' + city + '...', false, true);

    try {
      const res = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();

      const cur  = data.current_condition[0];
      const area = data.nearest_area[0];

      const cityName = area.areaName[0].value;
      const country  = area.country[0].value;
      const tempC    = parseInt(cur.temp_C);
      const feelsC   = parseInt(cur.FeelsLikeC);
      const humidity = cur.humidity + '%';
      const wind     = cur.windspeedKmph + ' km/h';
      const vis      = cur.visibility + ' km';
      const cond     = cur.weatherDesc[0].value;
      const icon     = WX_ICONS[parseInt(cur.weatherCode)] || '🌡️';
      const time     = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      document.getElementById('icon').textContent  = icon;
      document.getElementById('temp').textContent  = tempC + '°C';
      document.getElementById('city').textContent  = cityName + ', ' + country;
      document.getElementById('cond').textContent  = cond;
      document.getElementById('feels').textContent = 'Feels like ' + feelsC + '°C';
      document.getElementById('hum').textContent   = humidity;
      document.getElementById('wind').textContent  = wind;
      document.getElementById('vis').textContent   = vis;
      document.getElementById('updated').textContent = 'Updated at ' + time;
      document.getElementById('card').style.display = 'block';
      setStatus('');
    } catch(e) {
      setStatus('City not found. Check spelling and try again.', true);
    }
    btn.disabled = false;
  }

  go('Delhi');
</script>
</body>
</html>
