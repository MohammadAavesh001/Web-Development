<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Demo</title>
    <style>
      :root {
        --bg: white;
        --txt: black;
        --btn: rgb(124, 222, 255);
      }
      body.dark {
        --bg: black;
        --txt: white;
        --btn: limegreen;
      }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: Arial;
        padding: 20px;
        transition: 0.3s;
      }
      button {
        background: var(--btn);
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
      }

      html {
        scroll-behavior: smooth;
      }
      form input {
        display: block;
        margin: 10px 0;
        padding: 10px;
        width: 200px;
      }
      .error {
        color: red;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <button onclick="toggleDark()">Dark Mode</button>

    <h1>Validation Form</h1>

    <section id="form" style="margin-top: 200px">
      <h2>Simple Form</h2>
      <form onsubmit="return validate(event);">
        Email: <input type="email" id="email" required /><span
          class="error"
          id="err"
        ></span
        ><br />
        Password:
        <input type="password" id="pass" required minlength="8" /><br />
        <button type="submit">Submit</button>
      </form>
    </section>

    <script>
      function toggleDark() {
        document.body.classList.toggle("dark");
        this.textContent = document.body.classList.contains("dark")
          ? "Light"
          : "Dark";
      }

      function validate(e) {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("pass").value;
        document.getElementById("err").textContent = "";
        if (!email.includes("@")) {
          document.getElementById("err").textContent = "Bad email";
          return;
        }
        alert("OK!");
        return;
      }
    </script>
  </body>
</html>
